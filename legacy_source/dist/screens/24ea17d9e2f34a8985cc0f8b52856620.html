<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend", "Noto Sans KR", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>비밀번호 찾기 - 방과후학교</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 md:px-20 lg:px-40 py-3 sticky top-0 z-50">
<div class="flex items-center gap-4 text-primary">
<div class="size-8 flex items-center justify-center bg-primary/10 rounded-lg">
<span class="material-symbols-outlined text-primary">school</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">방과후학교 수강신청</h2>
</div>
<div class="flex flex-1 justify-end gap-8 items-center">
<nav class="hidden md:flex items-center gap-9">
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors" href="#">공지사항</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors" href="#">수강신청</a>
<a class="text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary text-sm font-medium transition-colors" href="#">마이페이지</a>
</nav>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 bg-primary text-white text-sm font-bold hover:bg-primary/90 transition-all">
<span>로그인</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex flex-1 justify-center py-12 px-4">
<div class="layout-content-container flex flex-col w-full max-w-[520px] bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 p-8">
<!-- Header Section -->
<div class="flex flex-col gap-2 mb-8 text-center">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-black tracking-tight">비밀번호 찾기</h1>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal">비밀번호를 잊으셨나요? 본인 확인 후 재설정할 수 있습니다.</p>
</div>
<!-- Tabs -->
<div class="flex border-b border-slate-200 dark:border-slate-800 mb-8">
<a class="flex-1 flex flex-col items-center justify-center border-b-2 border-transparent text-slate-400 pb-3 hover:text-slate-600 transition-all" href="#">
<span class="text-sm font-bold">아이디 찾기</span>
</a>
<a class="flex-1 flex flex-col items-center justify-center border-b-2 border-primary text-primary pb-3" href="#">
<span class="text-sm font-bold">비밀번호 찾기</span>
</a>
</div>
<!-- Form Content -->
<div class="flex flex-col gap-5">
<!-- Name Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">이름</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="flex w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 h-14 pl-12 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="이름을 입력해주세요" type="text"/>
</div>
</div>
<!-- ID Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">아이디</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">account_circle</span>
<input class="flex w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 h-14 pl-12 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="아이디를 입력해주세요" type="text"/>
</div>
</div>
<!-- Phone Number Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">휴대전화 번호</label>
<div class="flex gap-2">
<div class="relative flex-1">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">smartphone</span>
<input class="flex w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 h-14 pl-12 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="010-0000-0000" type="tel"/>
</div>
<button class="h-14 px-4 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-300 rounded-lg font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors whitespace-nowrap min-w-[100px]">
                                    인증번호 전송
                                </button>
</div>
</div>
<!-- Verification Code Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">인증번호 입력</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">verified_user</span>
<input class="flex w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 h-14 pl-12 pr-16 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" placeholder="6자리 인증번호" type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-primary text-sm font-medium">03:00</span>
</div>
</div>
<!-- Reset Password Button -->
<div class="pt-4 mt-2">
<button class="w-full flex items-center justify-center rounded-lg h-14 bg-primary text-white text-base font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all hover:-translate-y-0.5 active:translate-y-0">
                                비밀번호 재설정
                            </button>
</div>
<!-- Footer Links -->
<div class="flex justify-center gap-4 mt-6 text-sm text-slate-500 dark:text-slate-400">
<a class="hover:underline" href="#">로그인으로 돌아가기</a>
<span class="text-slate-300 dark:text-slate-700">|</span>
<a class="hover:underline" href="#">회원가입</a>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="flex flex-col items-center justify-center py-10 px-6 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 mt-12">
<div class="flex items-center gap-2 mb-4 text-slate-400">
<span class="material-symbols-outlined text-lg">verified_user</span>
<p class="text-xs font-medium uppercase tracking-widest">Secure Password Recovery System</p>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm">© 2024 AfterSchool Registration. All rights reserved.</p>
</footer>
</div>
</div>
</body></html>
