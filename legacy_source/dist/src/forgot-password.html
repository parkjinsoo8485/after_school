<!DOCTYPE html>
<html class="light" lang="ko">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>비밀번호 재설정 - 방과후 프로그램</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: { primary: "#137fec" },
          fontFamily: { display: ["Noto Sans KR", "Lexend", "sans-serif"] },
          boxShadow: { auth: "0 24px 80px rgba(15, 23, 42, 0.12)" }
        }
      }
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 350, "GRAD" 0, "opsz" 24;
    }
    body { letter-spacing: -0.01em; }
  </style>
  <script src="/ui_interactive.js"></script>
  <script type="module" crossorigin src="/assets/src_forgot-password-CnEnNQ9s.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/global-auth-BbaQ_MtY.js">
</head>
<body class="min-h-screen bg-slate-50 font-display text-slate-900">
  <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(19,127,236,0.14),_transparent_34%),linear-gradient(180deg,_#f8fbff_0%,_#f8fafc_48%,_#eef4ff_100%)]">
    <header class="sticky top-0 z-50 border-b border-slate-200/80 bg-white/85 backdrop-blur">
      <div class="mx-auto flex max-w-5xl items-center justify-between px-6 py-4">
        <button class="flex items-center gap-3 text-left" onclick="location.href='/index.html'" type="button">
          <span class="material-symbols-outlined text-3xl text-primary">school</span>
          <span>
            <strong class="block text-base font-bold">방과후 프로그램</strong>
            <span class="block text-xs text-slate-500">비밀번호 재설정</span>
          </span>
        </button>
        <a class="text-sm font-semibold text-slate-600 transition-colors hover:text-primary" href="/src/login.html">로그인으로 돌아가기</a>
      </div>
    </header>

    <main class="flex min-h-[calc(100vh-73px)] items-center justify-center px-6 py-12">
      <div class="w-full max-w-md rounded-[28px] border border-white/80 bg-white p-8 shadow-auth sm:p-10">
        <div id="step-email">
          <div class="mb-8 text-center">
            <div class="mx-auto mb-4 flex size-16 items-center justify-center rounded-2xl bg-primary/10 text-primary">
              <span class="material-symbols-outlined text-4xl">lock_reset</span>
            </div>
            <h1 class="text-3xl font-bold">비밀번호 찾기</h1>
            <p class="mt-3 text-sm leading-6 text-slate-500">가입한 이메일을 입력하면 재설정 링크를 보내드립니다.</p>
          </div>

          <div id="reset-feedback" class="mb-5 hidden rounded-2xl border px-4 py-3 text-sm font-medium"></div>

          <form id="reset-form" class="space-y-5" novalidate>
            <div class="space-y-2">
              <label class="ml-1 text-sm font-semibold text-slate-700" for="reset-email">이메일 주소</label>
              <div class="relative">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
                <input class="w-full rounded-2xl border border-slate-200 bg-slate-50 py-3.5 pl-12 pr-4 text-sm outline-none transition-all focus:border-primary focus:ring-4 focus:ring-primary/10" id="reset-email" placeholder="가입한 이메일을 입력해 주세요" required type="email">
              </div>
            </div>

            <button class="inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-primary px-4 py-4 text-base font-bold text-white transition-all hover:bg-primary/90 disabled:cursor-not-allowed disabled:opacity-70" id="reset-btn" type="submit">
              <span class="material-symbols-outlined">send</span>
              재설정 링크 보내기
            </button>
          </form>
        </div>

        <div id="step-sent" class="hidden text-center">
          <div class="mx-auto mb-5 flex size-20 items-center justify-center rounded-full bg-emerald-100 text-emerald-600">
            <span class="material-symbols-outlined text-5xl" style="font-variation-settings:'FILL' 1">mark_email_read</span>
          </div>
          <h2 class="text-2xl font-bold">이메일을 보냈습니다</h2>
          <p class="mt-3 text-sm leading-6 text-slate-500">아래 주소로 비밀번호 재설정 링크를 보냈습니다.</p>
          <p class="mt-2 font-bold text-primary" id="sent-email"></p>
          <div class="mt-6 rounded-2xl border border-blue-100 bg-blue-50 px-4 py-4 text-left text-sm leading-6 text-blue-700">
            메일이 보이지 않으면 스팸함을 확인하거나 30초 뒤 다시 요청해 주세요.
          </div>
          <div class="mt-6 flex flex-col gap-3">
            <button class="rounded-2xl border border-slate-200 px-4 py-3.5 font-bold text-slate-700 transition-colors hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-70" id="resend-btn" onclick="resendEmail()" type="button">다시 보내기</button>
            <a class="rounded-2xl bg-primary px-4 py-3.5 text-center font-bold text-white transition-colors hover:bg-primary/90" href="/src/login.html">로그인 페이지로 이동</a>
          </div>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
